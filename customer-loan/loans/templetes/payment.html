<!DOCTYPE html>
<html>
<head>
    <title>Make Payment</title>
</head>
<body>
    <h1>Pay Loan for {{ loan.customer.name }}</h1>
    <p>Loan Balance: ${{ loan.balance }}</p>

    <form method="POST">
        {% csrf_token %}
        <label>Amount to Pay:</label>
        <input type="number" step="0.01" name="amount_paid" required>
        <button type="submit">Pay</button>
    </form>

    <a href="{% url 'customer-list' %}">Back to Customers</a>
</body>
</html>
